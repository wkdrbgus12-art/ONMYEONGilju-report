<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>온명 · 나의 일주 리포트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-photo" aria-hidden="true"></div>
<div class="bg-overlay" aria-hidden="true"></div>

<div class="page">

  <header class="brand">
    <img src="icon.png" alt="" class="brand-mark">
    <img src="wordmark.png" alt="ONMYEONG 온명" class="brand-wordmark">
  </header>

  <main>

    <!-- 입력 화면 -->
    <section id="intro-section" class="card">
      <p class="eyebrow">사주 명리 · 일주 리포트</p>
      <h1>당신의 태어난 날에는<br>이미 이야기가 있습니다</h1>
      <p class="subtitle">이름과 생년월일(양력)을 입력하면, 60갑자 중 당신의 일주를 찾아<br class="br-desktop">고유한 성향 리포트를 보여드립니다.</p>

      <form id="ilju-form" autocomplete="off">
        <div class="field">
          <label for="name-input">이름</label>
          <input type="text" id="name-input" placeholder="예: 홍길동" required maxlength="20">
        </div>
        <div class="field">
          <label for="birth-input">생년월일 <span class="hint">(양력)</span></label>
          <input type="date" id="birth-input" required min="1920-01-01" max="2035-12-31">
        </div>
        <button type="submit" class="primary-btn">
          <span>내 일주 확인하기</span>
        </button>
        <p class="error-msg" id="error-msg"></p>
      </form>
    </section>

    <!-- 결과 화면 -->
    <section id="result-section" class="card result-card hidden">
      <button type="button" id="reset-btn" class="ghost-btn">&larr; 다시 입력하기</button>

      <div class="result-head">
        <p class="eyebrow" id="result-eyebrow"></p>
        <h2 id="result-title"></h2>
      </div>

      <div class="report-frame">
        <img id="result-image" alt="일주 리포트 이미지">
      </div>

      <p class="result-note">이미지를 길게 누르거나 우클릭하여 저장할 수 있어요.</p>
    </section>

  </main>

  <footer>
    <p><img src="icon.png" alt="" class="footer-mark"> ONMYEONG — 60갑자로 보는 나의 하루</p>
  </footer>

</div>

<script src="script.js"></script>
</body>
</html>
