<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>온명 · 나의 일주 리포트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Song+Myung&family=Noto+Serif+KR:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-photo" aria-hidden="true"></div>

<div class="page">

  <header class="brand">
    <a href="index.html" class="brand-link">
      <img src="icon.png" alt="" class="brand-mark">
      <span class="brand-name">온명</span>
    </a>
  </header>

  <main>

    <!-- 입력 화면 -->
    <section id="intro-section" class="card">
      <p class="eyebrow">「 사주 명리 · 일주 리포트 」</p>
      <h1>당신의 태어난 날에는<br>이미 이야기가 있습니다</h1>
      <p class="subtitle">이름과 생년월일(양력)을 입력하면, 60갑자 중 당신의 일주를 찾아<br class="br-desktop">고유한 성향 리포트를 보여드립니다.</p>

      <form id="ilju-form" autocomplete="off">
        <div class="field">
          <label for="name-input">이름</label>
          <input type="text" id="name-input" placeholder="예: 홍길동" required maxlength="20">
        </div>
        <div class="field">
          <label for="birth-input">생년월일 <span class="hint">(양력)</span></label>
          <input type="date" id="birth-input" required min="1920-01-01" max="2035-12-31">
        </div>
        <button type="submit" class="primary-btn">
          <span>내 일주 확인하기</span>
        </button>
        <p class="error-msg" id="error-msg"></p>
      </form>
    </section>

    <!-- 결과 화면 -->
    <section id="result-section" class="card result-card hidden">
      <button type="button" id="reset-btn" class="ghost-btn">&larr; 다시 입력하기</button>

      <div class="result-head">
        <p class="eyebrow" id="result-eyebrow"></p>
        <h2 id="result-title"></h2>
      </div>

      <div class="report-frame">
        <img id="result-image" alt="일주 리포트 이미지">
      </div>

      <p class="result-note">이미지를 길게 누르거나 우클릭하여 저장할 수 있어요.</p>

      <a class="reserve-btn"
         href="https://map.naver.com/p/search/%EC%98%A8%EB%AA%85/place/2033971599?c=17.81,0,0,0,dh&amp;placePath=%2Fhome%3Fbk_query%3D%EC%98%A8%EB%AA%85%26entry%3Dbmp%26from%3Dmap%26fromPanelNum%3D2%26timestamp%3D202607092041%26locale%3Dko%26svcName%3Dmap_pcv5%26searchText%3D%EC%98%A8%EB%AA%85"
         target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s-7-6.1-7-11.2A7 7 0 0 1 19 9.8C19 14.9 12 21 12 21z"/>
          <circle cx="12" cy="9.5" r="2.4"/>
        </svg>
        <span>온명(홍대) 예약하러 가기</span>
      </a>

      <a class="social-btn" href="https://www.instagram.com/onmyeong_studio/" target="_blank" rel="noopener noreferrer" aria-label="온명 스튜디오 인스타그램">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.2" cy="6.8" r="1"/>
        </svg>
        <span>@onmyeong_studio</span>
      </a>
    </section>

  </main>

  <footer>
    <p><img src="icon.png" alt="" class="footer-mark"> 온명 — 60갑자로 보는 나의 하루</p>
  </footer>

</div>

<script src="script.js"></script>
</body>
</html>
